name: Build Blog (static + SEO)

on:
  schedule:
    - cron: '0 21 * * *'   # 毎日 6:00 JST（21:00 UTC）に自動実行
  workflow_dispatch: {}      # 手動実行ボタン
  push:
    paths:
      - 'build-blog.js'      # スクリプト更新時にも再生成

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate blog pages
        run: node build-blog.js

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog sitemap.xml
          if git diff --staged --quiet; then
            echo "変更なし"
          else
            git commit -m "chore: rebuild blog pages [skip ci]"
            git push
          fi
